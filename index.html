<script>

// ====================== Bulk IP Anonymizer (New Feature) ======================
function isValidIPv4(str) {
  const parts = str.split('.');
  if (parts.length !== 4) return false;
  for (let i = 0; i < 4; i++) {
    const num = parseInt(parts[i], 10);
    if (isNaN(num) || num < 0 || num > 255) return false;
  }
  return true;
}

function extractUniqueIPs(text) {
  const ipv4Regex = /\b(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\b/g;
  const matches = text.match(ipv4Regex) || [];
  const validIPs = matches.filter(ip => isValidIPv4(ip));
  const unique = [...new Set(validIPs)];
  unique.sort((a, b) => {
    const ipToInt = ip => ip.split('.').reduce((acc, oct) => (acc << 8) + parseInt(oct, 10), 0) >>> 0;
    return ipToInt(a) - ipToInt(b);
  });
  return unique;
}

const DOC_NETWORKS = ["203.0.113.", "198.51.100.", "192.0.2."];
const MAX_IPS_PER_NET = 254;

function generateFakeIPs(uniqueRealIPs) {
  const maxTotal = DOC_NETWORKS.length * MAX_IPS_PER_NET;
  if (uniqueRealIPs.length > maxTotal) {
    throw new Error(`Too many unique IPs (${uniqueRealIPs.length}). Max ${maxTotal}.`);
  }
  const mapping = new Map();
  for (let idx = 0; idx < uniqueRealIPs.length; idx++) {
    const realIP = uniqueRealIPs[idx];
    const netIndex = Math.floor(idx / MAX_IPS_PER_NET);
    const hostOffset = (idx % MAX_IPS_PER_NET) + 1;
    const fakeIP = DOC_NETWORKS[netIndex] + hostOffset;
    mapping.set(realIP, fakeIP);
  }
  return mapping;
}

function replaceIPsInText(text, mapping) {
  let result = text;
  for (const [realIP, fakeIP] of mapping.entries()) {
    const escaped = realIP.replace(/\./g, '\\.');
    const re = new RegExp('\\b' + escaped + '\\b', 'g');
    result = result.replace(re, fakeIP);
  }
  return result;
}

function renderMappingTableHTML(mapping) {
  if (!mapping || mapping.size === 0) {
    return '<div class="cnote" style="margin-top:8px;">No IPv4 addresses found.</div>';
  }
  const sorted = Array.from(mapping.entries()).sort((a, b) => {
    const ipToInt = ip => ip.split('.').reduce((acc, oct) => (acc << 8) + parseInt(oct, 10), 0) >>> 0;
    return ipToInt(a[0]) - ipToInt(b[0]);
  });
  let html = `<table style="width:100%; border-collapse:collapse; font-family:var(--mono); font-size:11px;">
    <thead><tr><th style="text-align:left; border-bottom:1px solid var(--br);">Real IP</th><th style="text-align:left; border-bottom:1px solid var(--br);">➡️ Fake IP</th></tr></thead><tbody>`;
  for (const [real, fake] of sorted) {
    html += `<tr><td style="padding:4px 0; color:var(--r);">${escapeHtml(real)}</td><td style="padding:4px 0; color:var(--g);">${escapeHtml(fake)}</td></tr>`;
  }
  html += `</tbody></table><div class="cnote">Total unique IPs mapped: ${mapping.size}</div>`;
  return html;
}

function anonymizeFullCLI(inputText) {
  if (!inputText.trim()) {
    return { converted: "", mapping: new Map(), uniqueCount: 0 };
  }
  const uniqueIPs = extractUniqueIPs(inputText);
  if (uniqueIPs.length === 0) {
    return { converted: inputText, mapping: new Map(), uniqueCount: 0 };
  }
  const mapping = generateFakeIPs(uniqueIPs);
  const converted = replaceIPsInText(inputText, mapping);
  return { converted, mapping, uniqueCount: uniqueIPs.length };
}

function renderBulkAnonTab(el) {
  el.innerHTML = `
    <div class="cblock">
      <div class="chdr"><div class="chdr-l">📋 Full FortiGate CLI (paste any troubleshoot output)</div></div>
      <div class="cbody">
        <textarea id="bulkAnonInput" rows="12" style="width:100%; background:var(--bg); color:var(--t); font-family:var(--mono); font-size:11px; border:1px solid var(--br); border-radius:6px; padding:10px;" placeholder="Paste your full FortiGate CLI output with real IPs...&#10;Example:&#10;get system status&#10;diagnose debug flow filter addr 10.1.1.1&#10;diagnose vpn tunnel list&#10;..."></textarea>
        <div style="display:flex; gap:12px; margin-top:12px; flex-wrap:wrap;">
          <button class="sbtn" id="bulkAnonConvertBtn">✨ Convert & Anonymize</button>
          <button class="sbtn" id="bulkAnonCopyBtn" style="background:#15803D;">📋 Copy Anonymized CLI</button>
          <button class="sbtn" id="bulkAnonClearBtn" style="background:#4b5563;">🗑️ Clear</button>
        </div>
      </div>
    </div>
    <div class="cblock">
      <div class="chdr"><div class="chdr-l">🔄 Anonymized Output (fake IPs)</div></div>
      <div class="cbody">
        <pre id="bulkAnonOutput" style="background:#010409; border-radius:8px; padding:12px; font-family:var(--mono); font-size:11px; white-space:pre-wrap; overflow-x:auto; max-height:400px;">— Output will appear here —</pre>
      </div>
    </div>
    <div class="cblock">
      <div class="chdr"><div class="chdr-l">🔍 IP Mapping Table (Real → Fake)</div></div>
      <div class="cbody" id="bulkAnonMappingContainer">
        <div class="cnote">Run conversion to see mapping.</div>
      </div>
    </div>
    <div class="cnote">💡 All IPv4 addresses (including netmasks) are replaced with RFC 5737 documentation ranges. Unique across the whole CLI.</div>
  `;

  const inputArea = document.getElementById('bulkAnonInput');
  const outputPre = document.getElementById('bulkAnonOutput');
  const mappingDiv = document.getElementById('bulkAnonMappingContainer');
  const convertBtn = document.getElementById('bulkAnonConvertBtn');
  const copyBtn = document.getElementById('bulkAnonCopyBtn');
  const clearBtn = document.getElementById('bulkAnonClearBtn');

  function updateConversion() {
    const raw = inputArea.value;
    const result = anonymizeFullCLI(raw);
    if (result.converted === "") {
      outputPre.innerText = "— No input —";
      mappingDiv.innerHTML = '<div class="cnote">No input provided.</div>';
    } else {
      outputPre.innerText = result.converted;
      mappingDiv.innerHTML = renderMappingTableHTML(result.mapping);
    }
  }

  convertBtn.onclick = updateConversion;
  copyBtn.onclick = () => {
    const text = outputPre.innerText;
    if (text && text !== "— No input —" && text !== "— Output will appear here —") {
      navigator.clipboard.writeText(text);
      copyBtn.innerText = "✓ Copied!";
      setTimeout(() => copyBtn.innerText = "📋 Copy Anonymized CLI", 1500);
    } else {
      alert("Nothing to copy. Convert first.");
    }
  };
  clearBtn.onclick = () => {
    inputArea.value = "";
    outputPre.innerText = "— Output will appear here —";
    mappingDiv.innerHTML = '<div class="cnote">Run conversion to see mapping.</div>';
  };
}

const SAFE = {
  'diagnose': 'ro', 'get ': 'ro', 'show ': 'ro',
  'execute ping': 'ro', 'execute nslookup': 'ro', 'execute log': 'ro',
  'execute fortiguard': 'ro',
  'diagnose debug reset': 'caution', 'diagnose debug disable': 'caution',
  'diagnose sys session clear': 'danger', 'execute user clear': 'danger',
  'execute ha failover': 'danger', 'execute reboot': 'danger', 'execute shutdown': 'danger',
  'execute clear system arp': 'caution', 'execute ha synchronize': 'caution',
  'config ': 'caution', 'edit ': 'caution', 'set ': 'caution', 'end': 'caution', 'next': 'caution',
  'delete ': 'danger', 'unset ': 'caution',
};
function cmdSafety(cmd) {
  const c = cmd.trim().toLowerCase();
  if (!c || c.startsWith('(') || c.startsWith('#')) return null;
  for (const [k, v] of Object.entries(SAFE)) if (c.startsWith(k.toLowerCase())) return v;
  if (c.startsWith('diagnose')) return 'ro';
  if (c.startsWith('get ') || c.startsWith('show ')) return 'ro';
  return null;
}
function hasHighRisk(cmds) { return cmds.some(c => cmdSafety(c) === 'danger'); }
function hasCaution(cmds) { return cmds.some(c => cmdSafety(c) === 'caution'); }

function vendorSafety(cmd, vendor) {
  const c = cmd.trim().toLowerCase();
  if (c.startsWith('show') || c.startsWith('display') || c.startsWith('ping') || c.startsWith('traceroute') || c.startsWith('debug') && c.includes('?') || c === '?' || c === 'help')
    return 'ro';
  if (c.startsWith('configure') || c.startsWith('interface') || c.startsWith('vlan') || c.startsWith('router') || c.startsWith('ip route') || c.startsWith('no') || c.startsWith('default') || c.startsWith('write memory') || c.startsWith('copy running-config') || c.startsWith('system-view') || c.startsWith('undo shutdown') || c.startsWith('save'))
    return 'caution';
  if (c.includes('reload') || c.includes('reboot') || c.includes('reset') || (c.includes('clear') && !c.includes('clear counters')) || c.includes('erase'))
    return 'danger';
  return null;
}
function vendorBadge(cmd, vendor) {
  const s = vendorSafety(cmd, vendor);
  if (s === 'ro') return '<span class="cbadge ro">read-only</span>';
  if (s === 'caution') return '<span class="cbadge caution">&#9888; config change</span>';
  if (s === 'danger') return '<span class="cbadge danger">&#9888; service impact</span>';
  return '';
}

let ipMappings = []; // { real, fake, desc }
function generateFakeIP(real){
  let hash=0; for(let i=0;i<real.length;i++) hash=((hash<<5)-hash)+real.charCodeAt(i);
  hash=Math.abs(hash); let last=(hash%254)+1; let r=hash%3;
  if(r===0) return `192.0.2.${last}`; if(r===1) return `198.51.100.${last}`; return `203.0.113.${last}`;
}
function saveMappings(){ localStorage.setItem("forti_masks_standalone",JSON.stringify(ipMappings)); renderMaskTableStandalone(); }
function loadMappingsStandalone(){ let s=localStorage.getItem("forti_masks_standalone"); if(s){ try{ ipMappings=JSON.parse(s); }catch(e){ ipMappings=[]; } } else ipMappings=[]; renderMaskTableStandalone(); }
function renderMaskTableStandalone(){
  const cont=document.getElementById("maskTableStandalone"); if(!cont) return;
  if(!ipMappings.length){ cont.innerHTML="<div style='color:#FCD34D;'>✨ No IP mappings. Add a real IP → automatic fake IP (one row per IP).</div>"; return; }
  let html="<table class='ip-mask-table'><thead><tr><th>Real IP</th><th>Fake IP</th><th>Description</th><th>Action</th></tr></thead><tbody>";
  ipMappings.forEach(m=>{ html+=`<tr><td style='color:var(--r);'>${escapeHtml(m.real)}</td><td style='color:var(--g);'>${escapeHtml(m.fake)}</td><td>${escapeHtml(m.desc||'')}</td><td><button class='delMaskBtnStandalone' data-real='${m.real}' style='background:#B91C1C; padding:2px 8px; border-radius:20px;'>❌</button></td>`; });
  html+="</tbody></table><div class='cnote' style='margin-top:8px;'>Total mappings: "+ipMappings.length+"</div>";
  cont.innerHTML=html;
  document.querySelectorAll('.delMaskBtnStandalone').forEach(btn=>{ btn.addEventListener('click',(e)=>{ let real=btn.getAttribute('data-real'); ipMappings=ipMappings.filter(m=>m.real!==real); saveMappings(); }); });
}
function addMappingStandalone(real,desc){
  if(ipMappings.find(m=>m.real===real)){ alert("IP already mapped"); return false; }
  ipMappings.push({real, fake:generateFakeIP(real), desc:desc||""}); saveMappings(); return true;
}
function deleteAllMappingsStandalone(){ if(confirm("Delete ALL mappings?")){ ipMappings=[]; saveMappings(); } }
function maskTextStandalone(input){
  let out=input;
  ipMappings.forEach(m=>{ let regex=new RegExp(m.real.replace(/\./g,'\\.'),'g'); out=out.replace(regex,m.fake); });
  return out;
}
function exportMappingsStandalone(){
  let content="# FortiGate IP Masking Report\n\nReal → Fake:\n";
  ipMappings.forEach(m=>{ content+=`${m.real} → ${m.fake} (${m.desc||''})\n`; });
  let blob=new Blob([content],{type:"text/plain"}); let a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`fortigate_mask_${Date.now()}.txt`; a.click(); URL.revokeObjectURL(a.href);
}

  el.innerHTML=`
    <div class="card" style="background:var(--b2);border-radius:12px;padding:16px;">

      </div>

  `;
  loadMappingsStandalone();

  });

function escapeHtml(s){ return String(s).replace(/[&<>]/g,function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; return '&gt;';}); }

<script>
// ====================== MATRIX RAIN BACKGROUND ======================
const matrixCanvas = document.getElementById('matrixCanvas');
let matrixCtx = matrixCanvas.getContext('2d');
let matrixColumns = [];
let matrixDrops = [];
const matrixFontSize = 20;
const matrixChars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()_+{}:<>?~";

function initMatrixRain() {
    let w = window.innerWidth;
    let h = window.innerHeight;
    matrixCanvas.width = w;
    matrixCanvas.height = h;
    let cols = Math.floor(w / matrixFontSize);
    matrixColumns = cols;
    matrixDrops = new Array(cols).fill(1);
}

function drawMatrixRain() {
    let w = matrixCanvas.width;
    let h = matrixCanvas.height;
    matrixCtx.fillStyle = "rgba(0, 0, 0, 0.05)";
    matrixCtx.fillRect(0, 0, w, h);
    matrixCtx.fillStyle = "#0f8";
    matrixCtx.font = matrixFontSize + "px monospace";
    for (let i = 0; i < matrixDrops.length; i++) {
        let text = matrixChars[Math.floor(Math.random() * matrixChars.length)];
        let x = i * matrixFontSize;
        let y = matrixDrops[i] * matrixFontSize;
        matrixCtx.fillStyle = "#0f8";
        matrixCtx.fillText(text, x, y);
        if (y > matrixCanvas.height && Math.random() > 0.975) matrixDrops[i] = 0;
        matrixDrops[i]++;
    }
}

function resizeMatrix() {
    initMatrixRain();
}

window.addEventListener('resize', resizeMatrix);
function animateMatrix() {
    drawMatrixRain();
    requestAnimationFrame(animateMatrix);
}

initMatrixRain();
animateMatrix();

// ====================== VENDOR SELECTION ======================
function showVendorSelection(onSelect) {
    const existing = document.querySelector('.vendor-overlay');
    if (existing) existing.remove();
    const modalDiv = document.createElement('div');
    modalDiv.className = 'vendor-overlay';
    modalDiv.innerHTML = `
        <div class="vendor-card">
            <h3>🔌 Select Firewall Platform</h3>
            <div class="vendor-options">
                <div class="vendor-option" data-vendor="fortigate">
                    <div class="icon">🔒</div>
                    <h4>FortiGate</h4>
                    <p>FortiOS 6.x / 7.x<br>Full troubleshooting, config guides, AI assistant</p>
                </div>
                <div class="vendor-option" data-vendor="cisco">
                    <div class="icon">🟡</div>
                    <h4>Cisco Firewall</h4>
                    <p>ASA / FTD / IOS<br>CLI diagnostics & configuration</p>
                </div>
            </div>
            <button id="cancelVendorBtn" class="btn-secondary" style="margin-top:16px;">Cancel</button>
        </div>
    `;
    document.body.appendChild(modalDiv);
    document.querySelectorAll('.vendor-option').forEach(opt => {
        opt.addEventListener('click', () => {
            const vendor = opt.getAttribute('data-vendor');
            modalDiv.remove();
            onSelect(vendor);
        });
    });
    document.getElementById('cancelVendorBtn').addEventListener('click', () => {
        modalDiv.remove();
        showLoginScreen();
    });
}

// ====================== LOGIN ======================
function showLoginScreen() { 
    const loginHTML = `<div class="login-overlay" id="loginOverlay"><div class="login-card"><h2>🔐 FortiGate Toolkit</h2><input type="text" id="loginUsername" placeholder="Username"><input type="password" id="loginPassword" placeholder="Password"><button id="loginBtn">Login</button><div id="loginError" class="error"></div></div></div>`; 
    document.body.insertAdjacentHTML('beforeend', loginHTML); 
    document.getElementById('loginBtn').addEventListener('click', () => { 
        if (document.getElementById('loginUsername').value === 'Administrator' && document.getElementById('loginPassword').value === 'Mcit@1993Mcit@1993') { 
            sessionStorage.setItem('forti_logged_in', 'true'); 
            document.getElementById('loginOverlay').remove(); 
            showTermsModal(() => {
                showVendorSelection((vendor) => {
                    sessionStorage.setItem('selected_vendor', vendor);
                    initToolkit(vendor);
                });
            });
        } else { 
            document.getElementById('loginError').innerText = 'Invalid credentials'; 
        } 
    }); 
}

// ====================== CORE HELPERS ======================
const SAFE = { 'diagnose': 'ro', 'get ': 'ro', 'show ': 'ro', 'execute ping': 'ro', 'execute nslookup': 'ro', 'execute log': 'ro', 'execute fortiguard': 'ro', 'diagnose debug reset': 'caution', 'diagnose debug disable': 'caution', 'diagnose sys session clear': 'danger', 'execute user clear': 'danger', 'execute ha failover': 'danger', 'execute reboot': 'danger', 'execute shutdown': 'danger', 'execute clear system arp': 'caution', 'execute ha synchronize': 'caution', 'config ': 'caution', 'edit ': 'caution', 'set ': 'caution', 'end': 'caution', 'next': 'caution', 'delete ': 'danger', 'unset ': 'danger', };
function cmdSafety(cmd) { const c = cmd.trim().toLowerCase(); if (!c || c.startsWith('(') || c.startsWith('#')) return null; for (const [k, v] of Object.entries(SAFE)) if (c.startsWith(k.toLowerCase())) return v; if (c.startsWith('diagnose')) return 'ro'; if (c.startsWith('get ') || c.startsWith('show ')) return 'ro'; return null; }
function hasHighRisk(cmds) { return cmds.some(c => cmdSafety(c) === 'danger'); }
function hasCaution(cmds) { return cmds.some(c => cmdSafety(c) === 'caution'); }
function saveKey(){ const v=document.getElementById('apikey').value.trim(); if(!v)return; groqApiKey=v; localStorage.setItem('groq_key',v); document.getElementById('apikey').value=''; setKst('✓ saved','#3fb950'); }
window.addEventListener('load',()=>{ if(groqApiKey) setKst('✓ key loaded','#3fb950'); });
function setKst(t,c){const el=document.getElementById('kst');el.textContent=t;el.style.color=c;}
function sel(c){ cur=c; document.querySelectorAll('.cb').forEach(b=>b.classList.remove('active')); if(document.getElementById('cat-'+c)) document.getElementById('cat-'+c).classList.add('active'); render(); }
function stab(t){ tab=t; document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active')); if(document.getElementById('tab-'+t)) document.getElementById('tab-'+t).classList.add('active'); render(); }
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmt(t){ return t.replace(/```([\s\S]*?)```/g,'<pre>$1</pre>').replace(/`([^`]+)`/g,'<code>$1</code>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>'); }
function copyAll(btn,key,idx){ const step=D[cur].steps?D[cur].steps[idx]:D[cur].sections[idx]; const cmds=(step.cmds||[]).filter(c=>!c.startsWith('(')); navigator.clipboard.writeText(cmds.join('\n')).then(()=>{btn.textContent='✓ Copied!';setTimeout(()=>btn.textContent='Copy all',1500);}); }
function copyRef(btn,ci,si){ navigator.clipboard.writeText(QREF[ci].cmds[si]).then(()=>{btn.textContent='✓';setTimeout(()=>btn.textContent='Copy',1200);}); }
function askAI(q){stab('ai');setTimeout(()=>{const i=document.getElementById('chi');if(i){i.value=q;i.focus();}},50);}

// ====================== RENDER FUNCTIONS (FULL ORIGINAL) ======================
function render(){ const el=document.getElementById('mc'); if(tab==='guide'){ const d=D[cur]; if(d.type==='config') renderCfg(el,d); else renderGuide(el,d); } else if(tab==='analyze') renderAnalyze(el); else if(tab==='ai') renderAI(el); else if(tab==='ref') renderRef(el); else if(tab==='masking') renderMaskingTab(el); else if(tab==='freeai') renderFreeAITab(el); else if(tab==='multivendor') renderMultiVendorTab(el); else if(tab==='bulkAnon') renderBulkAnonTab(el); else if(tab==='subnetcalc') renderSubnetCalc(el); else if(tab==='advdiag') renderAdvDiag(el); }

function renderGuide(el,d){ let h='<div class="sh"><span class="stitle">'+d.t+'</span><span class="sev '+d.s+'">P1 common</span></div>'; h+='<div class="chips">'+d.chips.map(c=>'<span class="chip" onclick="askAI(\''+c.replace(/'/g,"\\'")+'  on FortiGate\')">'+c+' ↗</span>').join('')+'</div>'; d.steps.forEach((s,i)=>{ const real=s.cmds.filter(c=>!c.startsWith('(')); const risk=hasHighRisk(real)?'danger':hasCaution(real)?'warn':''; h+='<div class="cblock '+risk+'"><div class="chdr"><div class="chdr-l"><div class="snum">'+(i+1)+'</div>'+s.t+'</div><div style="display:flex;gap:6px;">'+(risk==='danger'?'<span class="cbadge danger">⚠️ service impact</span>':risk==='warn'?'<span class="cbadge caution">⚠️ config change</span>':'<span class="cbadge ro">read-only</span>')+'<button class="copybtn" onclick="copyAll(this,\''+cur+'\','+i+')">Copy all</button></div></div><div class="cbody">'+(risk==='danger'?'<div class="cdanger">⚠️ One or more commands below will impact live traffic or sessions. Use with caution in production.</div>':risk==='warn'?'<div class="cwarn">⚠️ One or more commands below will make configuration changes to the device.</div>':'')+'<div class="clines">'+s.cmds.map(c=>{if(c.startsWith('(')) return '<span style="color:var(--t3);font-style:italic">'+esc(c)+'</span>\n'; const sv=cmdSafety(c); let col='var(--g)'; if(sv==='danger') col='var(--r)'; else if(sv==='caution') col='var(--y)'; return '<span style="color:'+col+'">'+esc(c)+'</span>'+(sv==='danger'?' <span style="font-size:10px;color:var(--r);">⚠️CAUTION</span>':'')+'\n';}).join('')+'</div>'+(s.note?'<div class="cnote">'+s.note+'</div>':'')+'</div></div>'; });
  h+= `<div style="margin-top:32px; border-top:2px solid var(--br); padding-top:18px; background:rgba(0,0,0,0.2); border-radius:12px;"><div style="display:flex; align-items:center; gap:10px; margin-bottom:16px;"><span style="font-weight:700; font-size:15px;">📟 CLI Output Reader</span><span style="font-size:11px; color:var(--t2);">Paste command outputs from your terminal session (e.g., debug flow, sniffer, session list)</span></div><textarea id="troubleOutputInput" placeholder="Paste raw FortiGate CLI output here..." style="width:100%; background:#000000; color:#f0f0f0; border:1px solid var(--br); font-family:var(--mono); font-size:12px; padding:12px; border-radius:8px; resize:vertical;" rows="7"></textarea><div style="display:flex; justify-content:flex-end; gap:10px; margin:12px 0 16px;"><button id="troubleOutputRenderBtn" class="sbtn" style="background:var(--a);">🖥️ Render Output</button><button id="troubleOutputClearBtn" class="sbtn" style="background:#4b5563;">🗑️ Clear</button></div><div><div style="font-size:12px; margin-bottom:6px; color:var(--t2);">▶️ Output (black background / white text):</div><pre id="troubleOutputDisplay" style="background:#000000; color:#e6edf3; font-family:var(--mono); font-size:12px; line-height:1.5; padding:14px; border-radius:8px; border:1px solid var(--br); overflow-x:auto; white-space:pre-wrap; word-break:break-word; max-height:450px; margin:0;">— Paste CLI output and click "Render Output" —</pre></div><div class="cnote" style="margin-top:12px;">💡 Useful for reviewing output of any CLI command: diagnose debug flow, get vpn ipsec tunnel summary, diagnose sys session list, etc.</div></div>`;
  el.innerHTML = h;
  const renderBtn = el.querySelector('#troubleOutputRenderBtn');
  const clearBtn = el.querySelector('#troubleOutputClearBtn');
  const inputArea = el.querySelector('#troubleOutputInput');
  const displayPre = el.querySelector('#troubleOutputDisplay');
  if(renderBtn && inputArea && displayPre) { renderBtn.onclick = () => { displayPre.innerText = inputArea.value || "(no output pasted)"; }; }
  if(clearBtn && inputArea && displayPre) { clearBtn.onclick = () => { inputArea.value = ""; displayPre.innerText = "— Output will appear here —"; }; }
}

function renderRef(el){ let h='<div class="rgrid">'; QREF.forEach((s,ci)=>{ h+='<div class="cblock"><div class="chdr"><span style="font-weight:700;font-size:13px;">'+s.cat+'</span></div><div class="cbody">'; s.cmds.forEach((c,si)=>{ const sv=cmdSafety(c); let col='var(--g)'; if(sv==='danger') col='var(--r)'; else if(sv==='caution') col='var(--y)'; h+='<div style="display:flex;align-items:center;justify-content:space-between;padding:2px 0;border-bottom:1px solid var(--br);"><span style="font-family:var(--mono);font-size:11px;color:'+col+';">'+esc(c)+'</span><button class="copybtn" style="margin-left:8px;" onclick="copyRef(this,'+ci+','+si+')">Copy</button></div>'; }); h+='</div></div>'; }); h+='</div>'; el.innerHTML=h; }

let ipMappings = []; function generateFakeIP(real){ let hash=0; for(let i=0;i<real.length;i++) hash=((hash<<5)-hash)+real.charCodeAt(i); hash=Math.abs(hash); let last=(hash%254)+1; let r=hash%3; if(r===0) return `192.0.2.${last}`; if(r===1) return `198.51.100.${last}`; return `203.0.113.${last}`; }

function addMappingStandalone(real,desc){ if(ipMappings.find(m=>m.real===real)){ alert("IP already mapped"); return false; } ipMappings.push({real, fake:generateFakeIP(real), desc:desc||""}); saveMappings(); return true; }
function deleteAllMappingsStandalone(){ if(confirm("Delete ALL mappings?")){ ipMappings=[]; saveMappings(); } }
function maskTextStandalone(input){ let out=input; ipMappings.forEach(m=>{ let regex=new RegExp(m.real.replace(/\./g,'\\.'),'g'); out=out.replace(regex,m.fake); }); return out; }

function isValidIPv4(str) { const parts = str.split('.'); if (parts.length !== 4) return false; for (let i=0;i<4;i++) { const num = parseInt(parts[i],10); if (isNaN(num) || num<0 || num>255) return false; } return true; }
function extractUniqueIPs(text) { const ipv4Regex = /\b(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\b/g; const matches = text.match(ipv4Regex) || []; const validIPs = matches.filter(ip => isValidIPv4(ip)); const unique = [...new Set(validIPs)]; unique.sort((a,b)=>{ const ipToInt = ip => ip.split('.').reduce((acc,oct)=>(acc<<8)+parseInt(oct,10),0)>>>0; return ipToInt(a)-ipToInt(b); }); return unique; }
const DOC_NETWORKS = ["203.0.113.", "198.51.100.", "192.0.2."]; const MAX_IPS_PER_NET = 254;
function generateFakeIPs(uniqueRealIPs) { const maxTotal = DOC_NETWORKS.length * MAX_IPS_PER_NET; if (uniqueRealIPs.length > maxTotal) { throw new Error(`Too many unique IPs (${uniqueRealIPs.length}). Max ${maxTotal}.`); } const mapping = new Map(); for (let idx = 0; idx < uniqueRealIPs.length; idx++) { const realIP = uniqueRealIPs[idx]; const netIndex = Math.floor(idx / MAX_IPS_PER_NET); const hostOffset = (idx % MAX_IPS_PER_NET) + 1; const fakeIP = DOC_NETWORKS[netIndex] + hostOffset; mapping.set(realIP, fakeIP); } return mapping; }
function replaceIPsInText(text, mapping) { let result = text; for (const [realIP, fakeIP] of mapping.entries()) { const escaped = realIP.replace(/\./g, '\\.'); const re = new RegExp('\\b' + escaped + '\\b', 'g'); result = result.replace(re, fakeIP); } return result; }
function renderMappingTableHTML(mapping) { if (!mapping || mapping.size === 0) { return '<div class="cnote" style="margin-top:8px;">No IPv4 addresses found.</div>'; } const sorted = Array.from(mapping.entries()).sort((a,b)=>{ const ipToInt = ip => ip.split('.').reduce((acc,oct)=>(acc<<8)+parseInt(oct,10),0)>>>0; return ipToInt(a[0])-ipToInt(b[0]); }); let html = `<table style="width:100%; border-collapse:collapse; font-family:var(--mono); font-size:11px;"><thead><tr><th style="text-align:left; border-bottom:1px solid var(--br);">Real IP</th><th style="text-align:left; border-bottom:1px solid var(--br);">➡️ Fake IP</th></tr></thead><tbody>`; for (const [real, fake] of sorted) { html += `<tr><td style="padding:4px 0; color:var(--r);">${escapeHtml(real)}</span></td><td style="padding:4px 0; color:var(--g);">${escapeHtml(fake)}</span></tr>`; } html += `</tbody></table><div class="cnote">Total unique IPs mapped: ${mapping.size}</div>`; return html; }
function anonymizeFullCLI(inputText) { if (!inputText.trim()) { return { converted: "", mapping: new Map(), uniqueCount: 0 }; } const uniqueIPs = extractUniqueIPs(inputText); if (uniqueIPs.length === 0) { return { converted: inputText, mapping: new Map(), uniqueCount: 0 }; } const mapping = generateFakeIPs(uniqueIPs); const converted = replaceIPsInText(inputText, mapping); return { converted, mapping, uniqueCount: uniqueIPs.length }; }
function renderBulkAnonTab(el) { el.innerHTML = `<div class="cblock"><div class="chdr"><div class="chdr-l">📋 Full CLI (paste any troubleshoot output)</div></div><div class="cbody"><textarea id="bulkAnonInput" rows="12" style="width:100%; background:var(--bg); color:var(--t); font-family:var(--mono); font-size:11px; border:1px solid var(--br); border-radius:6px; padding:10px;" placeholder="Paste your full CLI output with real IPs..."></textarea><div style="display:flex; gap:12px; margin-top:12px; flex-wrap:wrap;"><button class="sbtn" id="bulkAnonConvertBtn">✨ Convert & Anonymize</button><button class="sbtn" id="bulkAnonCopyBtn" style="background:#15803D;">📋 Copy Anonymized CLI</button><button class="sbtn" id="bulkAnonClearBtn" style="background:#4b5563;">🗑️ Clear</button></div></div></div><div class="cblock"><div class="chdr"><div class="chdr-l">🔄 Anonymized Output (fake IPs)</div></div><div class="cbody"><pre id="bulkAnonOutput" style="background:#010409; border-radius:8px; padding:12px; font-family:var(--mono); font-size:11px; white-space:pre-wrap; overflow-x:auto; max-height:400px;">— Output will appear here —</pre></div></div><div class="cblock"><div class="chdr"><div class="chdr-l">🔍 IP Mapping Table (Real → Fake)</div></div><div class="cbody" id="bulkAnonMappingContainer"><div class="cnote">Run conversion to see mapping.</div></div></div><div class="cnote">💡 All IPv4 addresses (including netmasks) are replaced with RFC 5737 documentation ranges. Unique across the whole CLI.</div>`; const inputArea = document.getElementById('bulkAnonInput'); const outputPre = document.getElementById('bulkAnonOutput'); const mappingDiv = document.getElementById('bulkAnonMappingContainer'); const convertBtn = document.getElementById('bulkAnonConvertBtn'); const copyBtn = document.getElementById('bulkAnonCopyBtn'); const clearBtn = document.getElementById('bulkAnonClearBtn'); function updateConversion() { const raw = inputArea.value; const result = anonymizeFullCLI(raw); if (result.converted === "") { outputPre.innerText = "— No input —"; mappingDiv.innerHTML = '<div class="cnote">No input provided.</div>'; } else { outputPre.innerText = result.converted; mappingDiv.innerHTML = renderMappingTableHTML(result.mapping); } } convertBtn.onclick = updateConversion; copyBtn.onclick = () => { const text = outputPre.innerText; if (text && text !== "— No input —" && text !== "— Output will appear here —") { navigator.clipboard.writeText(text); copyBtn.innerText = "✓ Copied!"; setTimeout(() => copyBtn.innerText = "📋 Copy Anonymized CLI", 1500); } else { alert("Nothing to copy. Convert first."); } }; clearBtn.onclick = () => { inputArea.value = ""; outputPre.innerText = "— Output will appear here —"; mappingDiv.innerHTML = '<div class="cnote">Run conversion to see mapping.</div>'; }; }
function calculateSubnet(ipCidr) { let input = ipCidr.trim(); if (!input.includes('/')) return { error: "Use CIDR format: IP/prefix (e.g., 192.168.1.0/24)" }; let [ip, prefix] = input.split('/'); let maskBits = parseInt(prefix,10); if (isNaN(maskBits) || maskBits < 0 || maskBits > 32) return { error: "Prefix must be 0-32" }; let ipParts = ip.split('.'); if (ipParts.length !== 4) return { error: "Invalid IPv4 address" }; for (let p of ipParts) { let n = parseInt(p,10); if (isNaN(n) || n<0 || n>255) return { error: "Invalid IP octet" }; } let ipInt = ((parseInt(ipParts[0])<<24) | (parseInt(ipParts[1])<<16) | (parseInt(ipParts[2])<<8) | parseInt(ipParts[3])) >>> 0; let maskInt = ((1 << maskBits) - 1) << (32 - maskBits); let networkInt = ipInt & maskInt; let broadcastInt = networkInt | (~maskInt >>> 0); let firstHostInt = networkInt + 1; let lastHostInt = broadcastInt - 1; let totalHosts = Math.pow(2, 32 - maskBits) - 2; if (maskBits === 31) totalHosts = 2; if (maskBits === 32) totalHosts = 1; if (maskBits === 31) { firstHostInt = networkInt; lastHostInt = broadcastInt; } if (maskBits === 32) { firstHostInt = lastHostInt = networkInt; } let wildcardInt = (~maskInt) >>> 0; function intToIp(i) { return ((i>>>24)&0xFF)+'.'+((i>>>16)&0xFF)+'.'+((i>>>8)&0xFF)+'.'+(i&0xFF); } return { network: intToIp(networkInt), broadcast: intToIp(broadcastInt), firstUsable: maskBits >= 31 ? (maskBits===31 ? intToIp(firstHostInt)+" / "+intToIp(lastHostInt) : intToIp(firstHostInt)) : intToIp(firstHostInt), lastUsable: maskBits >= 31 ? "N/A (point-to-point)" : intToIp(lastHostInt), mask: intToIp(maskInt), cidr: maskBits, wildcard: intToIp(wildcardInt), totalHosts: totalHosts, binaryIp: ipInt.toString(2).padStart(32,'0'), binaryMask: maskInt.toString(2).padStart(32,'0'), binaryNetwork: networkInt.toString(2).padStart(32,'0'), error: null }; }
function renderSubnetCalc(el) { el.innerHTML = `<div class="cblock"><div class="chdr"><div class="chdr-l">🧮 IPv4 Subnet Calculator</div></div><div class="cbody"><div style="display:flex; gap:12px; flex-wrap:wrap; margin-bottom:12px;"><input type="text" id="subnetInput" placeholder="e.g., 192.168.1.0/24 or 10.0.0.0/16" style="flex:2; padding:8px; background:var(--bg); border:1px solid var(--br); border-radius:6px; color:var(--t); font-family:var(--mono);"><button class="sbtn" id="calcSubnetBtn">Calculate</button><button class="sbtn" id="exampleSubnetBtn" style="background:var(--b3);">📋 Example /24</button></div><div id="subnetResult"><div class="cnote">Enter an IPv4 address with CIDR prefix.</div></div></div></div>`; function update() { let input = document.getElementById('subnetInput').value; let info = calculateSubnet(input); if (info.error) { document.getElementById('subnetResult').innerHTML = `<div class="cdanger">⚠️ ${info.error}</div>`; return; } let hostsDisp = info.totalHosts; if (info.cidr === 31) hostsDisp = "2 (point-to-point)"; if (info.cidr === 32) hostsDisp = "1 (single host)"; let rangeDisp = (info.cidr <= 30) ? `${info.firstUsable} – ${info.lastUsable}` : (info.cidr===31 ? `Both IPs usable (point-to-point)` : `Only this host`); let html = `<div class="subnet-result-grid"><div class="subnet-card"><div class="subnet-label">Network Address</div><div class="subnet-value">${info.network}</div></div><div class="subnet-card"><div class="subnet-label">Broadcast Address</div><div class="subnet-value">${info.broadcast}</div></div><div class="subnet-card"><div class="subnet-label">First Usable IP</div><div class="subnet-value">${info.firstUsable}</div></div><div class="subnet-card"><div class="subnet-label">Last Usable IP</div><div class="subnet-value">${info.lastUsable}</div></div><div class="subnet-card"><div class="subnet-label">Netmask</div><div class="subnet-value">${info.mask} (/${info.cidr})</div></div><div class="subnet-card"><div class="subnet-label">Wildcard Mask</div><div class="subnet-value">${info.wildcard}</div></div><div class="subnet-card"><div class="subnet-label">Total Hosts</div><div class="subnet-value">${hostsDisp}</div></div><div class="subnet-card"><div class="subnet-label">Usable Range</div><div class="subnet-value">${rangeDisp}</div></div></div><div class="subnet-explanation"><strong>📘 Subnet Explanation</strong><br>• <strong>CIDR:</strong> /${info.cidr} means ${info.cidr} bits for network, ${32-info.cidr} bits for hosts.<br>• <strong>Netmask binary:</strong> ${info.binaryMask.match(/.{1,8}/g).join('.')}<br>• <strong>Network address:</strong> all host bits 0 → ${info.network}<br>• <strong>Broadcast address:</strong> all host bits 1 → ${info.broadcast}<br>• <strong>Wildcard mask:</strong> ${info.wildcard} (used in ACLs)<br>• <strong>Binary view:</strong><br>&nbsp;&nbsp;IP:   ${info.binaryIp.match(/.{1,8}/g).join('.')}<br>&nbsp;&nbsp;Mask: ${info.binaryMask.match(/.{1,8}/g).join('.')}<br>&nbsp;&nbsp;Net:  ${info.binaryNetwork.match(/.{1,8}/g).join('.')}</div>`; document.getElementById('subnetResult').innerHTML = html; } document.getElementById('calcSubnetBtn').onclick = update; document.getElementById('exampleSubnetBtn').onclick = () => { document.getElementById('subnetInput').value = "192.168.1.0/24"; update(); }; document.getElementById('subnetInput').addEventListener('keypress', e => { if(e.key==='Enter') update(); }); update(); }
function renderAdvDiag(el) { const sections = [ { title: "🩺 System Health & Performance", icon: "📊", commands: [ { cmd: "diagnose hardware sysinfo conserve", exp: "Shows conserve mode status and memory thresholds.", safety: "ro" }, { cmd: "diagnose sys top", exp: "Real‑time process CPU/memory usage (like Linux top).", safety: "ro" }, { cmd: "get hardware status", exp: "Hardware model, serial number, sensors.", safety: "ro" }, { cmd: "diagnose hardware sysinfo memory", exp: "Detailed memory breakdown (total, used, free).", safety: "ro" }, { cmd: "diagnose hardware sysinfo cpu", exp: "CPU load, frequencies, core usage.", safety: "ro" } ] }, { title: "🔧 Kernel & Low‑Level (fnsysctl)", icon: "🐧", commands: [ { cmd: "fnsysctl ifconfig", exp: "Native Linux interface config (shows physical stats).", safety: "ro" }, { cmd: "fnsysctl df -h", exp: "Filesystem disk usage.", safety: "ro" }, { cmd: "fnsysctl ls -la /data/", exp: "List files in FortiGate internal storage.", safety: "ro" }, { cmd: "fnsysctl cat /etc/hosts", exp: "View system hosts file.", safety: "ro" }, { cmd: "fnsysctl top", exp: "Linux top (real‑time process view). Use with caution.", safety: "caution" } ] }, { title: "🐛 Daemon Debugging (diagnose test application)", icon: "🔬", commands: [ { cmd: "diagnose test application wad 3", exp: "Debug Web Application Daemon (increases verbosity).", safety: "caution" }, { cmd: "diagnose test application fnbamd 3", exp: "Debug authentication daemon (fnbamd).", safety: "caution" }, { cmd: "diagnose test application ipsengine 4", exp: "Debug IPS engine (high verbosity).", safety: "danger" }, { cmd: "diagnose test application dnsproxy 6", exp: "DNS proxy debug (level 6).", safety: "caution" } ] }, { title: "🛡️ Control Plane Protection (Local‑In & DoS)", icon: "🛑", commands: [ { cmd: "show firewall local-in-policy", exp: "List local‑in policies that protect the FortiGate itself.", safety: "ro" }, { cmd: "diagnose firewall local-in list", exp: "Show active local‑in sessions (who is talking to the management IP).", safety: "ro" }, { cmd: "show firewall dos-policy", exp: "List DoS policies that protect against volumetric attacks.", safety: "ro" }, { cmd: "diagnose firewall dos <policy-id>", exp: "Show DoS policy counters and dropped packets.", safety: "ro" } ] }, { title: "📜 Logging & Bandwidth Monitoring", icon: "📈", commands: [ { cmd: "execute log display", exp: "Display real‑time logs from memory buffer.", safety: "ro" }, { cmd: "diagnose log test", exp: "Generate a test log entry (for testing log flows).", safety: "ro" }, { cmd: "get firewall internet-service bandwidth", exp: "Show bandwidth usage per Internet Service (requires license).", safety: "ro" }, { cmd: "diagnose sys session list | grep -c 'state=established'", exp: "Count established sessions (advanced pipe).", safety: "ro" } ] } ]; let html = `<div class="sh"><span class="stitle">🔬 Advanced Diagnostics</span><span class="sev info">Expert‑level commands</span></div>`; html += `<div class="cnote">⚠️ Many commands below are advanced and can impact performance or generate high output. Read the safety badges before using.</div>`; for (let sect of sections) { html += `<div class="cblock"><div class="chdr"><div class="chdr-l"><span style="margin-right:4px">${sect.icon}</span>${sect.title}</div></div><div class="cbody">`; for (let item of sect.commands) { let badge = ''; if (item.safety === 'ro') badge = '<span class="cbadge ro">🟢 read‑only</span>'; else if (item.safety === 'caution') badge = '<span class="cbadge caution">🟡 caution</span>'; else if (item.safety === 'danger') badge = '<span class="cbadge danger">🔴 dangerous</span>'; html += `<div class="clines" style="margin-bottom:6px;">${escapeHtml(item.cmd)}</div><div class="explanation">📝 ${item.exp} ${badge}</div>`; } html += `</div></div>`; } html += `<div class="cnote">💡 Pro tip: For multi‑line commands (like fnsysctl), you can copy them into the CLI directly. Always test in a lab first.</div>`; el.innerHTML = html; }

    currentVendor = vendor;
    if (vendor === 'fortigate') {
        D = D_FORTI;
        QREF = QREF_FORTI;
        document.querySelector('.ttxt').innerHTML = '⚡ FortiGate Pro Toolkit';
        document.querySelector('.ver').innerHTML = 'FortiOS 6.x / 7.x';
        initSidebarForti();
    } else {
        D = D_CISCO;
        QREF = QREF_CISCO;
        document.querySelector('.ttxt').innerHTML = '🟡 Cisco Firewall Toolkit';
        document.querySelector('.ver').innerHTML = 'ASA / FTD / IOS';
        initSidebarCisco();
    }
    cur = 'vpn';
    tab = 'guide';
    chat = [];
    loading = false;
    document.getElementById('toolkitContainer').style.display = 'block';
    render();
}

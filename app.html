<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>🐺 NetWolf | Advanced Diagnostics</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<style>
:root{--a:#1D9E75;--ad:#0F6E56;--bg:#0d1117;--b2:#161b22;--b3:#21262d;--br:#30363d;--t:#e6edf3;--t2:#8b949e;--t3:#484f58;--g:#3fb950;--y:#d29922;--r:#f85149;--bl:#58a6ff;--mono:'Courier New',monospace}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;background:transparent}
#matrixCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-2;pointer-events:none;background:#000000}

/* LOGIN OVERLAY */
.login-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.88);backdrop-filter:blur(8px);z-index:10000;display:flex;justify-content:center;align-items:center}
.login-card{background:rgba(22,27,34,0.97);border:1px solid rgba(29,158,117,0.4);border-radius:28px;padding:36px 32px;width:440px;max-width:94%;text-align:center;box-shadow:0 25px 45px rgba(0,0,0,0.7)}
.login-logo{font-family:var(--mono);font-size:24px;font-weight:700;color:var(--t);margin-bottom:4px}
.login-logo span{color:var(--a)}
.login-sub{font-size:13px;color:var(--t2);margin-bottom:28px}
.login-input{width:100%;margin-bottom:14px;padding:12px 18px;background:rgba(13,17,23,.9);border:1px solid var(--br);border-radius:40px;color:var(--t);font-size:14px;outline:none;transition:border-color .2s;font-family:inherit}
.login-input:focus{border-color:var(--a);box-shadow:0 0 0 3px rgba(29,158,117,.15)}
.login-btn{width:100%;background:linear-gradient(90deg,var(--a),var(--ad));border:none;padding:13px;border-radius:40px;font-weight:700;font-size:15px;color:#fff;cursor:pointer;transition:all .2s;margin-bottom:12px}
.login-btn:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(29,158,117,.3)}
.login-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
.login-forgot{background:none;border:none;color:var(--t2);font-size:12px;cursor:pointer;text-decoration:underline;transition:color .15s}
.login-forgot:hover{color:var(--a)}
.login-error{font-size:13px;margin-top:14px;min-height:18px}
.login-footer{margin-top:20px;padding-top:16px;border-top:1px solid var(--br);font-size:12px;color:var(--t3)}
.login-footer a{color:var(--a);text-decoration:none;font-weight:600}
.login-footer a:hover{text-decoration:underline}

/* TERMS OVERLAY */
.terms-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);backdrop-filter:blur(6px);z-index:10000;display:flex;justify-content:center;align-items:center}
.terms-card{background:rgba(22,27,34,0.96);backdrop-filter:blur(8px);border:1px solid rgba(29,158,117,0.4);border-radius:28px;padding:32px 28px;width:540px;max-width:94%;text-align:left;box-shadow:0 25px 45px rgba(0,0,0,0.6);max-height:85vh;overflow-y:auto}
.terms-card h3{font-size:20px;margin-bottom:12px;color:var(--a);text-align:center}
.terms-text{font-size:13px;color:var(--t2);line-height:1.65;margin:16px 0 20px;border-left:2px solid var(--a);padding-left:16px;max-height:360px;overflow-y:auto}
.terms-text strong{color:var(--t);font-weight:700}
.terms-text p{margin-bottom:12px}
.terms-text code{font-family:var(--mono);font-size:11px;background:var(--b3);padding:1px 5px;border-radius:3px;color:var(--g)}
.terms-card hr{margin:14px 0;border-color:var(--br)}
.terms-btn{background:linear-gradient(90deg,var(--a),var(--ad));border:none;padding:11px 22px;border-radius:40px;font-weight:700;font-size:14px;cursor:pointer;transition:all .2s;color:#fff;margin:6px 6px 0 0}
.terms-btn:hover{transform:translateY(-1px);box-shadow:0 6px 14px rgba(29,158,117,.3)}
.btn-secondary-t{background:linear-gradient(90deg,#3b4b5e,#2c3e45)}

/* TOOLKIT SHELL */
.shell{max-width:95%;width:1400px;margin:20px auto;border:1px solid var(--br);border-radius:12px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.5);position:relative;z-index:1;background:rgba(13,17,23,0.88);backdrop-filter:blur(2px)}
.tbar{display:flex;align-items:center;gap:10px;padding:11px 16px;background:var(--b2);border-bottom:1px solid var(--br)}
.dot{width:12px;height:12px;border-radius:50%}
.dot.r{background:#ff5f57}.dot.y{background:#ffbd2e}.dot.g{background:#28c840}
.ttxt{font-family:var(--mono);font-size:14px;color:var(--t);margin-left:6px;font-weight:700}
.ver{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--t3);display:flex;align-items:center;gap:12px}
.user-pill{background:rgba(29,158,117,.12);border:1px solid rgba(29,158,117,.25);border-radius:20px;padding:3px 12px;font-size:11px;color:var(--a);font-family:var(--mono)}
.logout-btn{background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.25);border-radius:20px;padding:3px 12px;font-size:11px;color:var(--r);cursor:pointer;font-family:var(--mono);transition:all .15s}
.logout-btn:hover{background:rgba(248,81,73,.2)}
.kbar{display:flex;align-items:center;gap:8px;padding:7px 16px;background:var(--b2);border-bottom:1px solid var(--br)}
.kbar label{font-size:12px;color:var(--t2);white-space:nowrap}
.kbar input{flex:1;font-size:12px;padding:5px 10px;border-radius:5px;border:1px solid var(--br);background:var(--bg);color:var(--t);font-family:var(--mono);outline:none}
.kbar input:focus{border-color:var(--a)}
.sbtn{font-size:12px;padding:5px 12px;border-radius:5px;background:var(--a);color:white;border:none;cursor:pointer;font-weight:600}
.sbtn:hover{background:var(--ad)}
.kst{font-size:11px;white-space:nowrap}
.layout{display:grid;grid-template-columns:240px 1fr;min-height:75vh}
.sidebar{background:var(--b2);border-right:1px solid var(--br);padding:10px 8px;display:flex;flex-direction:column;gap:2px;overflow-y:auto;max-height:calc(75vh - 20px)}
.slbl{font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.1em;text-transform:uppercase;padding:10px 10px 4px}
.cb{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:6px;font-size:13px;cursor:pointer;border:none;background:none;width:100%;text-align:left;color:var(--t2);transition:all .1s}
.cb:hover{background:var(--b3);color:var(--t)}
.cb.active{background:rgba(29,158,117,.15);color:var(--a);font-weight:700;border-left:2px solid var(--a);padding-left:8px}
.cb .ic{font-size:13px;width:16px;text-align:center;flex-shrink:0}
.main{display:flex;flex-direction:column;overflow:hidden}
.tabs{display:flex;border-bottom:1px solid var(--br);padding:0 14px;background:rgba(13,17,23,0.7);overflow-x:auto}
.tab{padding:9px 14px;font-size:13px;cursor:pointer;border:none;background:none;color:var(--t2);border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;transition:all .1s}
.tab:hover{color:var(--t)}
.tab.active{color:var(--a);border-bottom-color:var(--a);font-weight:700}
.content{flex:1;overflow-y:auto;padding:16px;max-height:calc(75vh - 80px)}
.sh{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.stitle{font-size:15px;font-weight:700;color:var(--t)}
.sev{font-size:11px;padding:3px 9px;border-radius:4px;font-weight:600}
.sev.high{background:rgba(248,81,73,.15);color:#f85149;border:1px solid rgba(248,81,73,.3)}
.sev.med{background:rgba(210,153,34,.15);color:#d29922;border:1px solid rgba(210,153,34,.3)}
.sev.low{background:rgba(63,185,80,.15);color:#3fb950;border:1px solid rgba(63,185,80,.3)}
.sev.info{background:rgba(88,166,255,.15);color:#58a6ff;border:1px solid rgba(88,166,255,.3)}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.chip{font-size:12px;padding:4px 10px;border-radius:20px;cursor:pointer;border:1px solid var(--br);background:var(--b2);color:var(--t2);transition:all .1s}
.chip:hover{border-color:var(--a);color:var(--a)}
.cblock{background:var(--b2);border:1px solid var(--br);border-radius:8px;margin-bottom:10px;overflow:hidden}
.cblock.danger{border-color:rgba(248,81,73,.4)}
.cblock.warn{border-color:rgba(210,153,34,.4)}
.chdr{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;border-bottom:1px solid var(--br)}
.chdr-l{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--t)}
.snum{width:20px;height:20px;border-radius:50%;background:rgba(29,158,117,.2);color:var(--a);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cbody{padding:10px 14px}
.clines{font-family:var(--mono);font-size:12px;line-height:1.8;white-space:pre-wrap;word-break:break-all;color:var(--g)}
.cnote{font-size:12px;color:var(--t2);margin-top:8px;line-height:1.6;border-left:2px solid var(--br);padding-left:8px}
.cwarn{font-size:12px;color:var(--y);margin-bottom:8px;line-height:1.6;padding:8px;border-radius:4px;background:rgba(210,153,34,.07);border-left:2px solid var(--y)}
.cdanger{font-size:12px;color:var(--r);margin-bottom:8px;line-height:1.6;padding:8px;border-radius:4px;background:rgba(248,81,73,.07);border-left:2px solid var(--r)}
.cbadge{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:700;white-space:nowrap}
.cbadge.ro{background:rgba(63,185,80,.15);color:#3fb950;border:1px solid rgba(63,185,80,.3)}
.cbadge.danger{background:rgba(248,81,73,.15);color:#f85149;border:1px solid rgba(248,81,73,.3)}
.cbadge.caution{background:rgba(210,153,34,.15);color:#d29922;border:1px solid rgba(210,153,34,.3)}
.copybtn{font-size:11px;padding:3px 10px;border-radius:4px;cursor:pointer;border:1px solid var(--br);background:var(--b3);color:var(--t2);transition:all .1s}
.copybtn:hover{border-color:var(--a);color:var(--a)}
.messages{overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:12px;min-height:350px;max-height:480px}
.msg{display:flex;gap:10px;align-items:flex-start}
.msg.user{flex-direction:row-reverse}
.av{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.av.ai{background:rgba(29,158,117,.2);color:var(--a)}
.av.usr{background:rgba(88,166,255,.2);color:var(--bl)}
.bubble{max-width:82%;padding:10px 14px;border-radius:10px;font-size:13px;line-height:1.7;border:1px solid var(--br);background:var(--b2);color:var(--t)}
.msg.user .bubble{background:var(--b3)}
.bubble code{font-family:var(--mono);font-size:11px;background:var(--b3);padding:1px 5px;border-radius:3px;color:var(--g)}
.bubble pre{font-family:var(--mono);font-size:11px;color:var(--g);background:var(--bg);padding:10px;border-radius:6px;margin-top:8px;overflow-x:auto;white-space:pre-wrap;border:1px solid var(--br)}
.bubble strong{color:var(--t);font-weight:700}
.irow{display:flex;gap:8px;padding:10px 14px;border-top:1px solid var(--br);background:var(--b2)}
.irow input{flex:1;font-size:13px;padding:8px 12px;border-radius:6px;border:1px solid var(--br);background:var(--bg);color:var(--t);outline:none}
.irow input:focus{border-color:var(--a)}
.ibtn{padding:8px 16px;border-radius:6px;background:var(--a);color:white;border:none;cursor:pointer;font-size:13px;font-weight:700}
.ibtn:hover{background:var(--ad)}
.ibtn:disabled{opacity:.4;cursor:not-allowed}
.empty{text-align:center;padding:50px 20px;color:var(--t3);font-size:13px}
.typing{display:flex;gap:4px;align-items:center;padding:4px 0}
.typing span{width:6px;height:6px;border-radius:50%;background:var(--t3);animation:blink 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
.rgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
select{font-size:12px;padding:6px 10px;border-radius:5px;border:1px solid var(--br);background:var(--b2);color:var(--t);outline:none}
textarea{outline:none;resize:vertical}
.mask-input-group{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.mask-input-group input{flex:1;min-width:150px}
.ip-mask-table{font-family:var(--mono);font-size:11px;border-collapse:collapse;width:100%}
.ip-mask-table th{text-align:left;padding:6px 4px;color:var(--t2)!important;border-bottom:1px solid var(--br);background:transparent}
.ip-mask-table td{padding:6px 4px;border-bottom:1px solid var(--br);color:var(--t)}
.ip-mask-table td:first-child{color:#f85149}
.ip-mask-table td:nth-child(2){color:#3fb950}
.analyzer-container{display:flex;flex-direction:column;gap:12px}
.analyzer-row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.analyzer-row label{font-size:12px;font-weight:600;color:var(--t2)}
.analyzer-row input,.analyzer-row select{flex:1;min-width:200px;background:var(--bg);color:var(--t);border:1px solid var(--br);border-radius:6px;padding:6px}
.analyzer-response{background:var(--b2)!important;color:var(--t)!important;border:1px solid var(--br);border-radius:8px;padding:12px;white-space:pre-wrap;font-family:var(--mono);font-size:12px;margin-top:8px;max-height:400px;overflow-y:auto}
.analyzer-response pre,.analyzer-response code{color:var(--g)!important;background:#0d1117!important;border-radius:6px;font-family:var(--mono)}
.analyzer-response pre{padding:8px;overflow-x:auto;border:1px solid var(--br);margin:4px 0}
.analyzer-response strong{color:var(--bl)}
textarea#groqPrompt{background:#0d1117!important;color:#e6edf3!important;border:1px solid var(--br);border-radius:6px;font-family:var(--mono);font-size:13px;padding:10px;width:100%}
textarea#groqPrompt::placeholder{color:#8b949e!important}
.vendor-section{margin-bottom:28px;border-left:3px solid var(--a);padding-left:16px}
.vendor-title{font-size:18px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.subnet-result-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}
.subnet-card{background:var(--b2);border-radius:8px;padding:12px;border:1px solid var(--br)}
.subnet-label{font-size:11px;color:var(--t2);text-transform:uppercase;letter-spacing:0.5px}
.subnet-value{font-family:var(--mono);font-size:14px;color:var(--g);word-break:break-all}
.subnet-explanation{background:rgba(29,158,117,.08);border-left:3px solid var(--a);padding:12px;margin-top:16px;border-radius:6px}
.mask-preview{background:#010409;border-radius:12px;padding:16px;margin-top:12px;font-family:var(--mono);font-size:13px;white-space:pre-wrap;overflow:auto;min-height:300px;max-height:500px;border:1px solid var(--br);color:var(--g)}
.ai-container{display:flex;flex-direction:column;height:100%;min-height:500px;background:var(--b2);border-radius:12px;overflow:hidden}
.ai-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:16px;background:var(--bg)}
.ai-message{display:flex;gap:12px;align-items:flex-start}
.ai-message.user{flex-direction:row-reverse}
.ai-avatar{width:32px;height:32px;border-radius:50%;background:rgba(29,158,117,.15);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.ai-avatar.user{background:rgba(88,166,255,.15);color:var(--bl)}
.ai-avatar.assistant{background:rgba(29,158,117,.2);color:var(--a)}
.ai-bubble{max-width:80%;padding:10px 14px;border-radius:12px;background:var(--b2);border:1px solid var(--br);color:var(--t)!important;font-size:13px;line-height:1.5}
.ai-message.user .ai-bubble{background:var(--b3);border-color:var(--a)}
.ai-bubble pre{background:#0d1117;padding:8px;border-radius:6px;overflow-x:auto;margin:8px 0;color:var(--g)!important;font-family:var(--mono);font-size:11px}
.ai-bubble code{background:#0d1117;padding:2px 5px;border-radius:4px;color:var(--g)!important;font-family:var(--mono);font-size:11px}
.ai-bubble strong{color:var(--bl)}
.ai-input-area{display:flex;gap:8px;padding:12px;background:var(--b2);border-top:1px solid var(--br)}
.ai-input-area input{flex:1;background:var(--bg);border:1px solid var(--br);border-radius:20px;padding:10px 14px;color:var(--t);font-family:var(--mono);font-size:13px;outline:none}
.ai-input-area input:focus{border-color:var(--a)}
.ai-input-area button{background:var(--a);border:none;border-radius:20px;padding:0 18px;color:white;font-weight:600;cursor:pointer}
.ai-typing{display:flex;gap:4px;align-items:center;padding:8px 0}
.ai-typing span{width:6px;height:6px;border-radius:50%;background:var(--t3);animation:blink 1.2s infinite}
.ai-typing span:nth-child(2){animation-delay:.2s}
.ai-typing span:nth-child(3){animation-delay:.4s}
@media(max-width:700px){.layout{grid-template-columns:1fr}.rgrid{grid-template-columns:1fr}.subnet-result-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<canvas id="matrixCanvas"></canvas>

<!-- LOGIN OVERLAY -->
<div id="loginOverlay" class="login-overlay">
  <div class="login-card">
    <div class="login-logo">🐺 Net<span>Wolf</span></div>
    <div class="login-sub">FortiGate Pro Toolkit — Sign in to continue</div>
    <input class="login-input" type="email" id="loginEmail" placeholder="Your email address" onkeydown="if(event.key==='Enter')doLogin()">

    <button class="login-forgot" onclick="doForgotPassword()">Forgot password?</button>
    <div id="loginError" class="login-error"></div>
    <div class="login-footer">Don't have an account? <a href="index.html">Subscribe here →</a></div>

</div>

<!-- TOOLKIT -->
<div id="toolkitContainer" style="display:none;">
<div class="shell">
  <div class="tbar">
    <div class="dot r"></div><div class="dot y"></div><div class="dot g"></div>
    <span class="ttxt">🐺 NetWolf | Fortigate Pro Toolkit</span>

        <button class="tab" onclick="stab('freeai')" id="tab-freeai">🧠 CLI Analyzer (Free AI)</button>
        <button class="tab" onclick="stab('multivendor')" id="tab-multivendor">🌐 Multi‑Vendor CLI</button>

    </div>
  </div>
</div>
</div>

<script>

const firebaseConfig={
  apiKey:"AIzaSyBU2ojtAtH2PvvrNJgG4vH3mbPdAPAGhzk",
  authDomain:"netwolf-ccd3d.firebaseapp.com",
  projectId:"netwolf-ccd3d",
  storageBucket:"netwolf-ccd3d.firebasestorage.app",
  messagingSenderId:"942931607129",
  appId:"1:942931607129:web:5f644a2625931c70d6bb48",
  measurementId:"G-W0G3X4T0EW"
};
firebase.initializeApp(firebaseConfig);
const fbAuth=firebase.auth();

/* ══ AUTH STATE — show login or toolkit ══ */
fbAuth.onAuthStateChanged(function(user){
  if(user){
    document.getElementById('loginOverlay').style.display='none';
    document.getElementById('toolkitContainer').style.display='block';
    const displayName=user.displayName||user.email.split('@')[0];

/* ══ LOGIN ══ */
function doLogin(){
  const email=document.getElementById('loginEmail').value.trim();
  const pass=document.getElementById('loginPassword').value;
  const errEl=document.getElementById('loginError');
  errEl.textContent='';errEl.style.color='var(--r)';
  if(!email||!pass){errEl.textContent='Please enter your email and password.';return;}
  const btn=document.getElementById('loginBtn');
  btn.disabled=true;btn.textContent='Signing in…';
  fbAuth.signInWithEmailAndPassword(email,pass)
    .catch(err=>{
      btn.disabled=false;btn.textContent='Login';
      const codes={'auth/user-not-found':'No account found with this email.','auth/wrong-password':'Incorrect password. Try again.','auth/invalid-credential':'Invalid email or password.','auth/invalid-email':'Please enter a valid email address.','auth/too-many-requests':'Too many attempts. Please wait a moment.'};
      errEl.textContent=codes[err.code]||'Login failed: '+err.message;
    });
}

/* ══ LOGOUT ══ */
function doLogout(){
  fbAuth.signOut().then(()=>{
    sessionStorage.clear();
    window.location.href='index.html';
  });
}

/* ══ FORGOT PASSWORD ══ */
function doForgotPassword(){
  const email=document.getElementById('loginEmail').value.trim();
  const errEl=document.getElementById('loginError');
  if(!email){errEl.style.color='var(--r)';errEl.textContent='Enter your email first, then click Forgot password.';return;}
  fbAuth.sendPasswordResetEmail(email)
    .then(()=>{errEl.style.color='var(--g)';errEl.textContent='✓ Reset email sent! Check your inbox.';})
    .catch(()=>{errEl.style.color='var(--r)';errEl.textContent='Could not send reset email. Check the address.';});
}

const matrixCanvas=document.getElementById('matrixCanvas');
let matrixCtx=matrixCanvas.getContext('2d');
let matrixDrops=[];
const matrixFontSize=20;
const matrixChars="ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()_+{}:<>?~";
function initMatrixRain(){let w=window.innerWidth,h=window.innerHeight;matrixCanvas.width=w;matrixCanvas.height=h;let cols=Math.floor(w/matrixFontSize);matrixDrops=new Array(cols).fill(1);}
function drawMatrixRain(){matrixCtx.fillStyle="rgba(0,0,0,0.05)";matrixCtx.fillRect(0,0,matrixCanvas.width,matrixCanvas.height);matrixCtx.fillStyle="#0f8";matrixCtx.font=matrixFontSize+"px monospace";for(let i=0;i<matrixDrops.length;i++){let text=matrixChars[Math.floor(Math.random()*matrixChars.length)];matrixCtx.fillText(text,i*matrixFontSize,matrixDrops[i]*matrixFontSize);if(matrixDrops[i]*matrixFontSize>matrixCanvas.height&&Math.random()>0.975)matrixDrops[i]=0;matrixDrops[i]++;}}
window.addEventListener('resize',initMatrixRain);
initMatrixRain();
function animateMatrix(){drawMatrixRain();requestAnimationFrame(animateMatrix);}
animateMatrix();

const SAFE={'diagnose':'ro','get ':'ro','show ':'ro','execute ping':'ro','execute nslookup':'ro','execute log':'ro','execute fortiguard':'ro','diagnose debug reset':'caution','diagnose debug disable':'caution','diagnose sys session clear':'danger','execute user clear':'danger','execute ha failover':'danger','execute reboot':'danger','execute shutdown':'danger','execute clear system arp':'caution','execute ha synchronize':'caution','config ':'caution','edit ':'caution','set ':'caution','end':'caution','next':'caution','delete ':'danger','unset ':'danger'};
function cmdSafety(cmd){const c=cmd.trim().toLowerCase();if(!c||c.startsWith('(')||c.startsWith('#'))return null;for(const[k,v]of Object.entries(SAFE))if(c.startsWith(k.toLowerCase()))return v;if(c.startsWith('diagnose'))return'ro';if(c.startsWith('get ')||c.startsWith('show '))return'ro';return null;}
function hasHighRisk(cmds){return cmds.some(c=>cmdSafety(c)==='danger');}
function hasCaution(cmds){return cmds.some(c=>cmdSafety(c)==='caution');}

'cfg-init':{t:'Initial FortiGate setup from scratch',s:'info',type:'config',sections:[

/* ══ RENDER FUNCTIONS ══ */
function render(){const el=document.getElementById('mc');if(tab==='guide'){const d=D[cur];if(d.type==='config')renderCfg(el,d);else renderGuide(el,d);}else if(tab==='analyze')renderAnalyze(el);else if(tab==='ai')renderAI(el);else if(tab==='ref')renderRef(el);else if(tab==='masking')renderMaskingTab(el);else if(tab==='freeai')renderFreeAITab(el);else if(tab==='multivendor')renderMultiVendorTab(el);else if(tab==='bulkAnon')renderBulkAnonTab(el);else if(tab==='subnetcalc')renderSubnetCalc(el);else if(tab==='advdiag')renderAdvDiag(el);}

function renderGuide(el,d){let h='<div class="sh"><span class="stitle">'+d.t+'</span><span class="sev '+d.s+'">P1 common</span></div>';h+='<div class="chips">'+d.chips.map(c=>'<span class="chip" onclick="askAI(\''+c.replace(/'/g,"\\'")+'  on FortiGate\')">'+c+' ↗</span>').join('')+'</div>';d.steps.forEach((s,i)=>{const real=s.cmds.filter(c=>!c.startsWith('('));const risk=hasHighRisk(real)?'danger':hasCaution(real)?'warn':'';h+='<div class="cblock '+risk+'"><div class="chdr"><div class="chdr-l"><div class="snum">'+(i+1)+'</div>'+s.t+'</div><div style="display:flex;gap:6px;">'+(risk==='danger'?'<span class="cbadge danger">⚠️ service impact</span>':risk==='warn'?'<span class="cbadge caution">⚠️ config change</span>':'<span class="cbadge ro">read-only</span>')+'<button class="copybtn" onclick="copyAll(this,\''+cur+'\','+i+')">Copy all</button></div></div><div class="cbody">'+(risk==='danger'?'<div class="cdanger">⚠️ One or more commands below will impact live traffic or sessions.</div>':risk==='warn'?'<div class="cwarn">⚠️ One or more commands below will make configuration changes.</div>':'')+'<div class="clines">'+s.cmds.map(c=>{if(c.startsWith('('))return'<span style="color:var(--t3);font-style:italic">'+esc(c)+'</span>\n';const sv=cmdSafety(c);let col='var(--g)';if(sv==='danger')col='var(--r)';else if(sv==='caution')col='var(--y)';return'<span style="color:'+col+'">'+esc(c)+'</span>'+(sv==='danger'?' <span style="font-size:10px;color:var(--r);">⚠️CAUTION</span>':'')+'\n';}).join('')+'</div>'+(s.note?'<div class="cnote">'+s.note+'</div>':'')+'</div></div>';});
  h+=`<div style="margin-top:32px;border-top:2px solid var(--br);padding-top:18px;background:rgba(0,0,0,0.2);border-radius:12px;"><div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;"><span style="font-weight:700;font-size:15px;">📟 CLI Output Reader</span><span style="font-size:11px;color:var(--t2);">Paste command outputs from your terminal session</span></div><textarea id="troubleOutputInput" placeholder="Paste raw FortiGate CLI output here..." style="width:100%;background:#000000;color:#f0f0f0;border:1px solid var(--br);font-family:var(--mono);font-size:12px;padding:12px;border-radius:8px;resize:vertical;" rows="7"></textarea><div style="display:flex;justify-content:flex-end;gap:10px;margin:12px 0 16px;"><button id="troubleOutputRenderBtn" class="sbtn">🖥️ Render Output</button><button id="troubleOutputClearBtn" class="sbtn" style="background:#4b5563;">🗑️ Clear</button></div><pre id="troubleOutputDisplay" style="background:#000000;color:#e6edf3;font-family:var(--mono);font-size:12px;line-height:1.5;padding:14px;border-radius:8px;border:1px solid var(--br);overflow-x:auto;white-space:pre-wrap;word-break:break-word;max-height:450px;margin:0;">— Paste CLI output and click "Render Output" —</pre></div>`;
  el.innerHTML=h;
  el.querySelector('#troubleOutputRenderBtn').onclick=()=>{el.querySelector('#troubleOutputDisplay').innerText=el.querySelector('#troubleOutputInput').value||"(no output pasted)";};
  el.querySelector('#troubleOutputClearBtn').onclick=()=>{el.querySelector('#troubleOutputInput').value='';el.querySelector('#troubleOutputDisplay').innerText='— Output will appear here —';};
}

function renderCfg(el,d){let h='<div class="sh"><span class="stitle">'+d.t+'</span><span class="sev info">Config Guide</span></div>';d.sections.forEach((s,i)=>{const real=s.cmds.filter(c=>!c.startsWith('('));const risk=hasHighRisk(real)?'danger':hasCaution(real)?'warn':'';h+='<div class="cblock '+risk+'"><div class="chdr"><div class="chdr-l"><span style="margin-right:4px">'+(s.icon||'📄')+'</span>'+s.t+'</div><div style="display:flex;gap:6px;">'+(risk==='danger'?'<span class="cbadge danger">⚠️ service impact</span>':risk==='warn'?'<span class="cbadge caution">⚠️ config change</span>':'')+'<button class="copybtn" onclick="copyAll(this,\''+cur+'\','+i+')">Copy all</button></div></div><div class="cbody">'+(s.warn?'<div class="cdanger">⚠️ '+s.warn+'</div>':'')+'<div class="clines">'+s.cmds.map(c=>{if(c.startsWith('('))return'<span style="color:var(--t3);font-style:italic">'+esc(c)+'</span>\n';const sv=cmdSafety(c);let col='var(--g)';if(sv==='danger')col='var(--r)';else if(sv==='caution')col='var(--y)';return'<span style="color:'+col+'">'+esc(c)+'</span>\n';}).join('')+'</div>'+(s.note?'<div class="cnote">'+s.note+'</div>':'')+'</div></div>';});el.innerHTML=h;}

function renderRef(el){let h='<div class="rgrid">';QREF.forEach((s,ci)=>{h+='<div class="cblock"><div class="chdr"><span style="font-weight:700;font-size:13px;">'+s.cat+'</span></div><div class="cbody">';s.cmds.forEach((c,si)=>{const sv=cmdSafety(c);let col='var(--g)';if(sv==='danger')col='var(--r)';else if(sv==='caution')col='var(--y)';h+='<div style="display:flex;align-items:center;justify-content:space-between;padding:2px 0;border-bottom:1px solid var(--br);"><span style="font-family:var(--mono);font-size:11px;color:'+col+';">'+esc(c)+'</span><button class="copybtn" style="margin-left:8px;" onclick="copyRef(this,'+ci+','+si+')">Copy</button></div>';});h+='</div></div>';});h+='</div>';el.innerHTML=h;}

function renderAI(el){let msgs='';if(!chat.length)msgs='<div class="empty"><div style="font-size:28px;margin-bottom:10px;">🛠️</div>Ask anything about FortiGate.<br><br>Tip: click any chip to auto-fill a question.<br><br>✨ Powered by Groq (free tier)</div>';else{chat.forEach(m=>{const u=m.role==='user';msgs+='<div class="msg '+(u?'user':'')+'"><div class="av '+(u?'usr':'ai')+'">'+(u?'U':'FG')+'</div><div class="bubble">'+fmt(m.content)+'</div></div>';});if(loading)msgs+='<div class="msg"><div class="av ai">FG</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div></div>';}el.innerHTML='<div class="messages" id="chatm">'+msgs+'</div><div class="irow"><input type="text" id="chi" placeholder="e.g. Phase 2 keeps flapping..." onkeydown="if(event.key===\'Enter\')sendMsg()"/><button class="ibtn" onclick="sendMsg()" '+(loading?'disabled':'')+'>Send ↗</button></div>';const cm=document.getElementById('chatm');if(cm)cm.scrollTop=cm.scrollHeight;}

async function sendMsg(){const inp=document.getElementById('chi');if(!inp||loading)return;const text=inp.value.trim();if(!text)return;inp.value='';chat.push({role:'user',content:text});loading=true;render();const sys='You are a senior FortiGate engineer. Current category: "'+D[cur].t+'". Give concise, practical FortiGate CLI. Use backticks.';try{if(!groqApiKey)throw new Error('no-key');const resp=await fetch('https://api.groq.com/openai/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${groqApiKey}`},body:JSON.stringify({model:'llama-3.3-70b-versatile',max_tokens:1200,messages:[{role:'system',content:sys},...chat]})});const data=await resp.json();if(data.error)throw new Error(data.error.message);chat.push({role:'assistant',content:data.choices[0].message.content});}catch(e){chat.push({role:'assistant',content:e.message==='no-key'?'No Groq API key set. Enter your key at the top.':'Error: '+e.message});}loading=false;render();}

function renderAnalyze(el){el.innerHTML='<div style="margin-bottom:10px;"><div style="font-size:15px;font-weight:700;">Paste CLI output for AI analysis</div><div style="font-size:12px;color:var(--t2);">Mask IPs before sending.</div></div><div style="display:flex;gap:8px;margin-bottom:8px;"><select id="acat" style="font-size:12px;padding:6px;background:var(--b2);"><option value="">-- Context --</option>'+Object.keys(D).map(k=>'<option value="'+k+'">'+D[k].t+'</option>').join('')+'</select><input type="text" id="acmd" placeholder="Command you ran" style="flex:1;font-size:12px;padding:6px;background:var(--bg);"/></div><textarea id="aout" placeholder="Paste raw FortiGate CLI output..." style="width:100%;height:160px;font-family:var(--mono);font-size:12px;padding:12px;background:var(--bg);color:var(--g);border:1px solid var(--br);border-radius:8px;"></textarea><div id="ares" style="margin-top:12px;"></div>';}

let ipMappings=[];
function generateFakeIP(real){let hash=0;for(let i=0;i<real.length;i++)hash=((hash<<5)-hash)+real.charCodeAt(i);hash=Math.abs(hash);let last=(hash%254)+1;let r=hash%3;if(r===0)return`192.0.2.${last}`;if(r===1)return`198.51.100.${last}`;return`203.0.113.${last}`;}
function saveMappings(){localStorage.setItem("forti_masks_standalone",JSON.stringify(ipMappings));renderMaskTableStandalone();}
function loadMappingsStandalone(){let s=localStorage.getItem("forti_masks_standalone");if(s){try{ipMappings=JSON.parse(s);}catch(e){ipMappings=[];}}else ipMappings=[];renderMaskTableStandalone();}
function renderMaskTableStandalone(){const cont=document.getElementById("maskTableStandalone");if(!cont)return;if(!ipMappings.length){cont.innerHTML="<div style='color:#FCD34D;'>✨ No IP mappings yet.</div>";return;}let html="<table class='ip-mask-table'><thead><tr><th>Real IP</th><th>Fake IP</th><th>Description</th><th>Action</th></tr></thead><tbody>";ipMappings.forEach(m=>{html+=`<tr><td>${escapeHtml(m.real)}</td><td>${escapeHtml(m.fake)}</td><td>${escapeHtml(m.desc||'')}</td><td><button class='delMaskBtnStandalone' data-real='${m.real}' style='background:#B91C1C;color:white;border:none;border-radius:20px;padding:2px 8px;cursor:pointer;'>❌</button></td></tr>`;});html+="</tbody></table>";cont.innerHTML=html;document.querySelectorAll('.delMaskBtnStandalone').forEach(btn=>{btn.addEventListener('click',()=>{ipMappings=ipMappings.filter(m=>m.real!==btn.getAttribute('data-real'));saveMappings();});});}
function addMappingStandalone(real,desc){if(ipMappings.find(m=>m.real===real)){alert("IP already mapped");return false;}ipMappings.push({real,fake:generateFakeIP(real),desc:desc||""});saveMappings();return true;}
function maskTextStandalone(input){let out=input;ipMappings.forEach(m=>{let regex=new RegExp(m.real.replace(/\./g,'\\.'),'g');out=out.replace(regex,m.fake);});return out;}
function renderMaskingTab(el){el.innerHTML=`<div class="card" style="background:var(--b2);border-radius:12px;padding:16px;"><div class="stitle" style="margin-bottom:12px;">🎭 IP Masking</div><div class="mask-input-group"><input type="text" id="realIpMask" placeholder="Real IP (e.g., 192.168.1.100)" style="background:var(--bg);color:var(--t);border:1px solid var(--br);border-radius:6px;padding:8px"><input type="text" id="descMask" placeholder="Description (optional)" style="background:var(--bg);color:var(--t);border:1px solid var(--br);border-radius:6px;padding:8px"><button class="sbtn" id="addMaskBtnStandalone">➕ Add</button></div><div id="maskTableStandalone" style="background:#010409;border-radius:12px;padding:12px;margin:12px 0;overflow-x:auto;"></div><div style="display:flex;gap:8px;margin-bottom:16px;"><button class="sbtn" id="deleteAllMaskStandalone" style="background:#B91C1C;">🗑️ Delete all</button><button class="sbtn" id="exportMaskStandalone" style="background:#15803D;">📄 Export</button></div><textarea id="rawTextMask" rows="10" placeholder="Paste any FortiGate output with real IPs..." style="width:100%;background:var(--bg);color:var(--t);border:1px solid var(--br);border-radius:6px;padding:10px;font-family:var(--mono);font-size:12px;"></textarea><button class="sbtn" id="applyMaskStandalone" style="background:var(--a);margin-top:6px;">🎭 Mask this text</button><pre id="maskedPreviewStandalone" class="mask-preview">Masked output will appear here.</pre></div>`;loadMappingsStandalone();document.getElementById("addMaskBtnStandalone")?.addEventListener('click',()=>{let real=document.getElementById("realIpMask").value.trim();let desc=document.getElementById("descMask").value.trim();if(real)addMappingStandalone(real,desc);document.getElementById("realIpMask").value="";document.getElementById("descMask").value="";});document.getElementById("deleteAllMaskStandalone")?.addEventListener('click',()=>{if(confirm("Delete ALL mappings?")){ipMappings=[];saveMappings();}});document.getElementById("exportMaskStandalone")?.addEventListener('click',()=>{let content="# NetWolf IP Masking Report\n\n";ipMappings.forEach(m=>{content+=`${m.real} → ${m.fake} (${m.desc||''})\n`;});let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([content],{type:"text/plain"}));a.download=`netwolf_mask_${Date.now()}.txt`;a.click();});document.getElementById("applyMaskStandalone")?.addEventListener('click',()=>{let raw=document.getElementById("rawTextMask").value;document.getElementById("maskedPreviewStandalone").innerText=maskTextStandalone(raw)||"(nothing to mask)";});}

ompt){respDiv.innerHTML='<span style="color:var(--r);">Enter some CLI output first.</span>';return;}if(!groqApiKeyFree){respDiv.innerHTML='<span style="color:var(--r);">Enter your Groq API key first.</span>';return;}respDiv.innerHTML='<div class="typing"><span></span><span></span><span></span></div> Analyzing...';try{const resp=await fetch('https://api.groq.com/openai/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${groqApiKeyFree}`},body:JSON.stringify({model:document.getElementById('groqModelSelect').value,messages:[{role:'system',content:'You are a senior FortiGate network engineer. Analyze the CLI output and provide diagnosis, root cause, and fix commands.'},{role:'user',content:prompt}],temperature:0.3,max_tokens:1500})});const data=await resp.json();if(data.error)throw new Error(data.error.message);respDiv.innerHTML=fmt(data.choices[0].message.content);}catch(err){respDiv.innerHTML=`<span style="color:var(--r);">❌ ${err.message}</span>`;}};document.getElementById('copyGroqResponseBtn').onclick=()=>{navigator.clipboard.writeText(document.getElementById('groqResponse').innerText);};}

function extractUniqueIPs(text){const re=/\b(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\b/g;return[...new Set((text.match(re)||[]))].sort();}
function generateFakeIPs(ips){const nets=["203.0.113.","198.51.100.","192.0.2."];const m=new Map();ips.forEach((ip,i)=>{m.set(ip,nets[Math.floor(i/254)]+(i%254+1));});return m;}
function replaceIPsInText(text,map){let r=text;for(const[real,fake]of map.entries()){r=r.replace(new RegExp('\\b'+real.replace(/\./g,'\\.')+'\\b','g'),fake);}return r;}
function renderBulkAnonTab(el){el.innerHTML=`<div class="cblock"><div class="chdr"><div class="chdr-l">🔄 Bulk IP Anonymizer</div></div><div class="cbody"><textarea id="bulkAnonInput" rows="10" style="width:100%;background:var(--bg);color:var(--t);font-family:var(--mono);font-size:11px;border:1px solid var(--br);border-radius:6px;padding:10px;" placeholder="Paste FortiGate CLI output with real IPs..."></textarea><div style="display:flex;gap:12px;margin-top:12px;flex-wrap:wrap;"><button class="sbtn" id="bulkAnonConvertBtn">✨ Anonymize</button><button class="sbtn" id="bulkAnonCopyBtn" style="background:#15803D;">📋 Copy</button><button class="sbtn" id="bulkAnonClearBtn" style="background:#4b5563;">🗑️ Clear</button></div></div></div><div class="cblock"><div class="chdr"><div class="chdr-l">Anonymized Output</div></div><div class="cbody"><pre id="bulkAnonOutput" style="background:#010409;border-radius:8px;padding:12px;font-family:var(--mono);font-size:11px;white-space:pre-wrap;overflow-x:auto;max-height:400px;">— Output will appear here —</pre></div></div><div class="cblock"><div class="chdr"><div class="chdr-l">IP Mapping Table</div></div><div class="cbody" id="bulkAnonMappingContainer"><div class="cnote">Run conversion to see mapping.</div></div></div>`;document.getElementById('bulkAnonConvertBtn').onclick=()=>{const raw=document.getElementById('bulkAnonInput').value;const ips=extractUniqueIPs(raw);const map=generateFakeIPs(ips);document.getElementById('bulkAnonOutput').innerText=replaceIPsInText(raw,map);let th='<table style="width:100%;border-collapse:collapse;font-family:var(--mono);font-size:11px;"><thead><tr><th style="text-align:left;border-bottom:1px solid var(--br);">Real</th><th style="text-align:left;border-bottom:1px solid var(--br);">→ Fake</th></tr></thead><tbody>';for(const[r,f]of map.entries())th+=`<tr><td style="padding:3px 0;color:var(--r);">${r}</td><td style="padding:3px 0;color:var(--g);">${f}</td></tr>`;th+='</tbody></table>';document.getElementById('bulkAnonMappingContainer').innerHTML=th;};document.getElementById('bulkAnonCopyBtn').onclick=()=>{navigator.clipboard.writeText(document.getElementById('bulkAnonOutput').innerText);};document.getElementById('bulkAnonClearBtn').onclick=()=>{document.getElementById('bulkAnonInput').value='';document.getElementById('bulkAnonOutput').innerText='— Output will appear here —';document.getElementById('bulkAnonMappingContainer').innerHTML='<div class="cnote">Run conversion to see mapping.</div>';};}

function calculateSubnet(ipCidr){let[ip,prefix]=ipCidr.trim().split('/');let mb=parseInt(prefix);if(isNaN(mb)||mb<0||mb>32)return{error:"Prefix must be 0-32"};let p=ip.split('.').map(Number);if(p.length!==4||p.some(n=>isNaN(n)||n<0||n>255))return{error:"Invalid IP"};let ipI=((p[0]<<24)|(p[1]<<16)|(p[2]<<8)|p[3])>>>0;let mI=mb===0?0:(((1<<mb)-1)<<(32-mb))>>>0;let nI=(ipI&mI)>>>0,bI=(nI|(~mI>>>0))>>>0;const itp=i=>((i>>>24)&255)+'.'+((i>>>16)&255)+'.'+((i>>>8)&255)+'.'+(i&255);let h=mb>=31?Math.pow(2,32-mb):Math.pow(2,32-mb)-2;return{network:itp(nI),broadcast:itp(bI),firstUsable:mb<=30?itp(nI+1):'N/A',lastUsable:mb<=30?itp(bI-1):'N/A',mask:itp(mI),cidr:mb,wildcard:itp((~mI)>>>0),totalHosts:h,binaryIp:ipI.toString(2).padStart(32,'0'),binaryMask:mI.toString(2).padStart(32,'0'),binaryNetwork:nI.toString(2).padStart(32,'0'),error:null};}
function renderSubnetCalc(el){el.innerHTML=`<div class="cblock"><div class="chdr"><div class="chdr-l">🧮 IPv4 Subnet Calculator</div></div><div class="cbody"><div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px;"><input type="text" id="subnetInput" placeholder="e.g., 192.168.1.0/24" style="flex:2;padding:8px;background:var(--bg);border:1px solid var(--br);border-radius:6px;color:var(--t);font-family:var(--mono);"><button class="sbtn" id="calcSubnetBtn">Calculate</button><button class="sbtn" id="exampleSubnetBtn" style="background:var(--b3);">📋 Example</button></div><div id="subnetResult"><div class="cnote">Enter an IPv4 address with CIDR prefix.</div></div></div></div>`;function update(){const info=calculateSubnet(document.getElementById('subnetInput').value);if(info.error){document.getElementById('subnetResult').innerHTML=`<div class="cdanger">⚠️ ${info.error}</div>`;return;}let h=`<div class="subnet-result-grid"><div class="subnet-card"><div class="subnet-label">Network</div><div class="subnet-value">${info.network}</div></div><div class="subnet-card"><div class="subnet-label">Broadcast</div><div class="subnet-value">${info.broadcast}</div></div><div class="subnet-card"><div class="subnet-label">First Usable</div><div class="subnet-value">${info.firstUsable}</div></div><div class="subnet-card"><div class="subnet-label">Last Usable</div><div class="subnet-value">${info.lastUsable}</div></div><div class="subnet-card"><div class="subnet-label">Netmask</div><div class="subnet-value">${info.mask} (/${info.cidr})</div></div><div class="subnet-card"><div class="subnet-label">Wildcard</div><div class="subnet-value">${info.wildcard}</div></div><div class="subnet-card"><div class="subnet-label">Usable Hosts</div><div class="subnet-value">${info.totalHosts.toLocaleString()}</div></div><div class="subnet-card"><div class="subnet-label">CIDR</div><div class="subnet-value">/${info.cidr}</div></div></div><div class="subnet-explanation"><strong>Binary view:</strong><br>IP:&nbsp;&nbsp; ${info.binaryIp.match(/.{8}/g).join('.')}<br>Mask: ${info.binaryMask.match(/.{8}/g).join('.')}<br>Net:&nbsp; ${info.binaryNetwork.match(/.{8}/g).join('.')}</div>`;document.getElementById('subnetResult').innerHTML=h;}document.getElementById('calcSubnetBtn').onclick=update;document.getElementById('exampleSubnetBtn').onclick=()=>{document.getElementById('subnetInput').value='192.168.1.0/24';update();};document.getElementById('subnetInput').addEventListener('keypress',e=>{if(e.key==='Enter')update();});}
